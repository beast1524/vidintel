version: '3.8'

services:

  backend:
    build: ./backend
    container_name: vidintel-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - HOST=0.0.0.0
      - PORT=8000
      - AUDIO_DIR=data/audio
      - INDEX_DIR=data/indexes
    volumes:
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - REACT_APP_API_URL=http://localhost:8000
    container_name: vidintel-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
